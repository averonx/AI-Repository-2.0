<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Tools Hub</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <!-- Header -->
  <header>
    <h1>Discover <span>AI Tools</span></h1>
    <p>Find the best AI tools for coding, writing, and more.</p>
  </header>

  <!-- Search -->
  <input type="text" id="search" placeholder="Search tools...">

  <!-- Filters -->
  <div class="filters">
    <button data-category="all" class="active">All</button>
    <button data-category="writing">Writing</button>
    <button data-category="coding">Coding</button>
    <button data-category="image">Image</button>
  </div>

  <!-- Cards -->
  <div id="tools-container"></div>

</div>

<script src="script.js"></script>
</body>
</html>
